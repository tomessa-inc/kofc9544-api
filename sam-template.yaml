---
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless Express KOFC9544 API powered by API Gateway and Lambda
Parameters:
    ParentDomainName:
        Type: String
        Description: API Domain name
        Default: "kofc9544.ca"
    DomainName:
        Type: String
        Description: API Domain name
        Default: $DomainName
    Certificate:
        Type: String
        Description: Certificate
        Default: $Certificate
    BucketNameImages:
        Type: String
        Description: Bucket for Images
        Default: $BucketNameImages
    Stage:
        Type: String
        Description: Bucket for Images
        Default: $Stage
    DbHost:
        Type: String
        Description: Bucket for Images
        Default: $DbHost
    DbName:
        Type: String
        Description: Bucket for Images
        Default: $DbName
    DbUserName:
        Type: String
        Description: Bucket for Images
        Default: $DbUserName
    DbPassword:
        Type: String
        Description: Bucket for Images
        Default: $DbPassword
    NodeEnv:
        Type: String
        Description: Bucket for Images
        Default: $NodeEnv

    TokenSecret:
        Type: String
        Description: Token Secret
        Default: $TokenSecret
    CacheId:
        Type: String
        Description: Cache ID
        Default: $CacheId

    RDSHost:
        Type: String
        Description: RDS Host URL
        Default: $RDSHost

    RDSDBName:
        Type: String
        Description: RDS Database
        Default: $RDSDBName

    DEBUG:
        Type: String
        Description: Cache ID
        Default: sequelize:sql*

Conditions:
    UseDomainName: !Not
        - !Equals
            - !Ref DomainName
            - ''
    UseCertificate: !Not
        - !Equals
            - !Ref Certificate
            - ''

Resources:
    ExpressApi:
        Type: AWS::Serverless::Api
        Properties:
            StageName: !Ref Stage
            BinaryMediaTypes:
                - image/png
                - image/jpg
                - image/jpeg
                - multipart/form-data



    MyApiRoute53RecordSetGroup:
        Type: AWS::Route53::RecordSetGroup
        #     Condition: UseDomainName
        Properties:
            HostedZoneName: !Sub ${ParentDomainName}.
            RecordSets:
                - Name: !Sub "${DomainName}."
                  Type: A
                  AliasTarget:
                      EvaluateTargetHealth: true
                      HostedZoneId: Z2FDTNDATAQYW2
                      DNSName: !Sub ${Distribution.DomainName}.

    Distribution:
        Type: AWS::CloudFront::Distribution
        Properties:
            Tags:
                - Key: Environment
                  Value: !Ref NodeEnv

            DistributionConfig:
                Enabled: "true"
                Comment: !Ref AWS::StackName
                Aliases:
                    - !Ref DomainName
                CNAMEs:
                    - !Ref DomainName
                ViewerCertificate:
                    AcmCertificateArn: arn:aws:acm:us-east-1:767397839074:certificate/8ddd4c0d-1ef3-4f40-b226-6f96c67b4dfe
                    SslSupportMethod: sni-only
                HttpVersion: http2
                Origins:
                    - DomainName: !Sub "${ExpressApi}.execute-api.${AWS::Region}.amazonaws.com"
                      OriginPath: !Sub "/${Stage}"
                      Id: ApiOrigin
                      CustomOriginConfig:
                          HTTPPort: 80
                          HTTPSPort: 443
                          OriginProtocolPolicy: https-only
                DefaultCacheBehavior:
                    Compress: "true"
                    AllowedMethods:
                        - GET
                        - HEAD
                        - OPTIONS
                        - PUT
                        - POST
                        - PATCH
                        - DELETE
                    TargetOriginId: ApiOrigin
                    ViewerProtocolPolicy: "allow-all"
                    CachePolicyId: !Ref CacheId
                    OriginRequestPolicyId: "b689b0a8-53d0-40ab-baf2-68738e2966ac"


Outputs:

    ApiGatewayApiConsoleUrl:
        Description: Console URL for the API Gateway API's Stage.
        Value: !Sub https://${AWS::Region}.console.aws.amazon.com/apigateway/home?region=${AWS::Region}#/apis/${ExpressApi}/stages/${Stage}

    ApiUrl:
        Description: Invoke URL for your API. Clicking this link will perform a GET request
            on the root resource of your API.
        Value: !Sub https://${ExpressApi}.execute-api.${AWS::Region}.amazonaws.com/

